<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EDEN - 忘記密碼</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/eden.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='image/favicon.ico') }}">
    <style>
        body { margin: 0; padding: 0; background-color: #030a05; font-family: sans-serif; }
        .auth-container { max-width: 420px; margin: 80px auto; padding: 30px; background: rgba(10, 25, 15, 0.8); border: 1px solid #104020; border-radius: 8px; text-align: center; }
        .auth-input, .auth-select { width: 100%; padding: 10px; margin: 8px 0; background: #051008; border: 1px solid #20f050; color: #e0e0e0; border-radius: 4px; box-sizing: border-box; }
        .auth-select { cursor: pointer; }
        .auth-select option { background: #051008; }
        .auth-btn { width: 100%; padding: 12px; background: #20f050; border: none; color: #030a05; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 15px; }
        .auth-btn:hover { box-shadow: 0 0 10px #20f050; }
        .auth-link { color: #a0d0b0; text-decoration: none; display: inline-block; margin-top: 15px; font-size: 14px; }
        .auth-link:hover { color: #20f050; }
        .error-msg { color: #ff4d4d; background: rgba(255,77,77,0.1); border: 1px solid #ff4d4d; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #154525; }
        .step-dot.active { background: #20f050; box-shadow: 0 0 6px #20f050; }
        .step-dot.done { background: #3a7050; }
        .section-label { color: #3a7050; font-size: 12px; text-align: left; margin: 12px 0 4px; letter-spacing: 1px; }
        .warning-note { color: #a0d0b0; font-size: 12px; margin-top: 8px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="sidebar-wrapper">
        <div class="hamburger-btn">☰</div>
        <nav class="side-menu">
            <a href="{{ url_for('home') }}">首頁 HOME</a>
            <a href="{{ url_for('about') }}">關於我們 ABOUT</a>
            <a href="{{ url_for('achievements') }}">成果展示 ACHIEVEMENTS</a>
            <a href="{{ url_for('contact') }}">聯絡我們 CONTACT</a>
            <a href="{{ url_for('forum') }}">討論區 FORUM</a>
        </nav>
    </div>

    <div class="auth-container">
        <h2 style="color: #e0e0e0; letter-spacing: 2px;">找回密碼</h2>

        <!-- 步驟指示點 -->
        <div class="step-indicator">
            <div class="step-dot {% if step == 1 %}active{% else %}done{% endif %}"></div>
            <div class="step-dot {% if step == 2 %}active{% elif step > 2 %}done{% endif %}"></div>
            <div class="step-dot {% if step == 3 %}active{% endif %}"></div>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        {% if step == 1 %}
        <!-- 步驟一：輸入帳號 -->
        <p style="color:#a0d0b0; font-size:14px; margin-bottom:16px;">請輸入你的帳號以繼續</p>
        <form method="POST">
            <input type="hidden" name="step" value="1">
            <div class="section-label">── 帳號</div>
            <input type="text" name="username" class="auth-input" placeholder="請輸入使用者名稱" required autocomplete="off">
            <button type="submit" class="auth-btn">下一步</button>
        </form>

        {% elif step == 2 %}
        <!-- 步驟二：選擇安全提問並回答 -->
        <p style="color:#a0d0b0; font-size:14px; margin-bottom:16px;">請選擇你註冊時設定的安全提問並填寫答案</p>
        <form method="POST">
            <input type="hidden" name="step" value="2">
            <input type="hidden" name="username" value="{{ username }}">

            <div class="section-label">── 安全提問</div>
            <select name="security_question" class="auth-select" required>
                <option value="" disabled selected>請選擇你當時設定的提問...</option>
                {% for q in questions %}
                <option value="{{ q }}">{{ q }}</option>
                {% endfor %}
            </select>

            <div class="section-label">── 答案</div>
            <input type="text" name="security_answer" class="auth-input"
                   placeholder="請輸入答案（不區分大小寫）" required autocomplete="off">

            <div class="warning-note">
                ※ 請選擇你當初註冊時選擇的提問，選錯提問即使答案正確也會驗證失敗
            </div>

            <button type="submit" class="auth-btn">驗證</button>
        </form>

        {% elif step == 3 %}
        <!-- 步驟三：重設密碼 -->
        <p style="color:#20f050; font-size:14px; margin-bottom:16px;">✓ 驗證成功，請設定新密碼</p>
        <form method="POST">
            <input type="hidden" name="step" value="3">
            <input type="hidden" name="username" value="{{ username }}">
            <input type="hidden" name="answer_token" value="{{ answer_token }}">

            <div class="section-label">── 新密碼</div>
            <input type="password" name="new_password" class="auth-input"
                   placeholder="請輸入新密碼（至少4碼）" required>
            <input type="password" name="confirm_password" class="auth-input"
                   placeholder="再次輸入新密碼" required>

            <button type="submit" class="auth-btn">確認重設密碼</button>
        </form>
        {% endif %}

        <a href="{{ url_for('login') }}" class="auth-link">← 返回登入</a>
    </div>
</body>
</html>
