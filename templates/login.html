<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EDEN - 會員登入</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/eden.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='image/favicon.ico') }}">
    <style>
        body { margin: 0; padding: 0; background-color: #030a05; font-family: sans-serif; }
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: rgba(10, 25, 15, 0.8); border: 1px solid #104020; border-radius: 8px; text-align: center; }
        .auth-input { width: 100%; padding: 10px; margin: 10px 0; background: #051008; border: 1px solid #20f050; color: #e0e0e0; border-radius: 4px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #20f050; border: none; color: #030a05; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 15px; }
        .auth-btn:hover { box-shadow: 0 0 10px #20f050; }
        .auth-link { color: #a0d0b0; text-decoration: none; display: inline-block; margin-top: 15px; font-size: 14px; }
        .auth-link:hover { color: #20f050; }
        .error-msg { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        .link-row { display: flex; justify-content: space-between; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="sidebar-wrapper">
        <div class="hamburger-btn">☰</div>
        <nav class="side-menu">
            <a href="{{ url_for('home') }}">首頁 HOME</a>
            <a href="{{ url_for('about') }}">關於我們 ABOUT</a>
            <a href="{{ url_for('achievements') }}">成果展示 ACHIEVEMENTS</a>
            <a href="{{ url_for('contact') }}">聯絡我們 CONTACT</a>
            <a href="{{ url_for('forum') }}">討論區 FORUM</a>
        </nav>
    </div>

    <div class="auth-container">
        <h2 style="color: #e0e0e0; letter-spacing: 2px;">會員登入</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" class="auth-input" placeholder="使用者名稱" required autocomplete="off">
            <input type="password" name="password" class="auth-input" placeholder="密碼" required>
            <button type="submit" class="auth-btn">登入平台</button>
        </form>

        <div class="link-row">
            <a href="{{ url_for('register') }}" class="auth-link">還沒有帳號？點此註冊</a>
            <a href="{{ url_for('forgot_password') }}" class="auth-link">忘記密碼？</a>
        </div>
    </div>
</body>
</html>
